[gemini]
model = "gemini-2.5-pro"
max_tokens = 8192
timeout = "30s"

[sensors.mqtt]
type = "mqtt"
broker_url = "tcp://broker.example.com:1883"
topic = "printer/telemetry"
poll_timeout = "10s"

[logging]
path = "~/.qraftworx/logs"
level = "info"

[cost]
daily_budget_usd = 5.00
warn_threshold_usd = 4.00
